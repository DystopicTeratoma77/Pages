<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Registro de Bonos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: #f4f7f6;
            color: #333333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', Arial, sans-serif;
        }

        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 460px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #243782;
        }

        .description {
            text-align: center;
            margin-bottom: 25px;
            font-size: 15px;
            color: #666666;
            line-height: 1.4;
        }

        .form-section {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="radio"] {
            margin-right: 8px;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #cccccc;
            font-size: 14px;
            background-color: #ffffff;
            color: #333333;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #5896FF;
        }

        input[readonly] {
            background-color: #f0f0f0;
            color: #777777;
            cursor: not-allowed;
            border: 1px solid #e0e0e0;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #5896FF;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }

        button:hover {
            background-color: #407ce5;
        }

        .hidden {
            display: none;
        }

        .mensaje-confirmacion {
            text-align: center;
            font-size: 18px;
            padding: 20px;
            color: #28a745;
        }

        .spinner {
            margin: 10px auto 0;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #5896FF;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        button:disabled {
            background-color: #a0c4ff;
            cursor: wait;
        }

        /* Estilos del Modal Personalizado */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 400px;
            text-align: center;
            transform: translateY(-20px);
            transition: all 0.3s ease;
        }

        .modal-overlay.active .modal-box {
            transform: translateY(0);
        }

        .modal-box h3 {
            margin-top: 0;
            color: #333;
        }

        .modal-box p {
            color: #666;
            margin-bottom: 25px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .modal-btn {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            flex: 1;
        }

        .btn-confirm {
            background-color: #5896FF;
            color: white;
        }

        .btn-confirm:hover {
            background-color: #407ce5;
        }

        .btn-cancel {
            background-color: #f0f0f0;
            color: #333;
        }

        .btn-cancel:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>

<body>

    <div class="form-container" id="contenedor-formulario">
        <h2>FORMULARIO DE BENEFICIOS</h2>
        <p class="description">Indique de qué forma quiere percibir sus beneficios.</p>

        <form id="bono-form">
            <div class="form-section">
                <label for="date">Fecha:</label>
                <!-- Usamos 'date' (inglés) para coincidir con la columna en Sheets que pediste -->
                <input type="text" id="date" name="date" readonly />
            </div>

            <div class="form-section">
                <label for="user">Usuario:</label>
                <input type="text" id="user" name="user" readonly placeholder="Cargando URL..." />
            </div>

            <div class="form-section">
                <label for="cve">Clave de distribuidor:</label>
                <input type="text" id="cve" name="cve" readonly placeholder="Cargando URL..." />
            </div>

            <div class="form-section">
                <label for="bonus_type">Tipo de beneficio:</label>
                <select id="bonus_type" name="bonus_type" required>
                    <option value="" disabled selected>Seleccione una opción...</option>
                    <option value="Nota de Crédito">Nota de Crédito</option>
                    <option value="Partes Gratis">Partes Gratis</option>
                </select>
            </div>

            <button type="submit">Guardar mi respuesta</button>
            <div class="spinner" id="spinner"></div>
        </form>

        <div id="mensaje-confirmacion" class="mensaje-confirmacion hidden">
            ✅ Bono registrado con éxito.
        </div>
    </div>

    <!-- Modal de Confirmación -->
    <div class="modal-overlay" id="modal-confirmacion">
        <div class="modal-box">
            <h3>Confirmar Envío</h3>
            <p>¿Estás seguro de tu respuesta?</p>
            <div class="modal-buttons">
                <button type="button" class="modal-btn btn-cancel" id="btn-cancelar">Cancelar</button>
                <button type="button" class="modal-btn btn-confirm" id="btn-confirmar">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // 1. Inyectar 'user' (email) y 'cve' desde los parámetros de la URL
        // Ejemplo de URL esperada: Formulario_Bono.html?email=miguel@simdatagroup.com&cve=12345
        // o si usas 'user' en la URL en vez de 'email': Formulario_Bono.html?user=miguel@simdatagroup.com&cve=12345

        const emailParam = getQueryParam("email") || getQueryParam("user");
        if (emailParam) {
            document.getElementById("user").value = decodeURIComponent(emailParam);
        }

        const cveParam = getQueryParam("cve");
        if (cveParam) {
            document.getElementById("cve").value = decodeURIComponent(cveParam);
        }

        // 2. Insertar la fecha actual (date)
        const fechaCDMX = new Date().toLocaleString("sv-SE", { timeZone: "America/Mexico_City" }).replace(" ", "T");
        document.getElementById("date").value = fechaCDMX;

        // 3. Manejar el envío (submit) del formulario
        const form = document.getElementById('bono-form');
        const spinner = document.getElementById('spinner');
        const submitButton = form.querySelector('button');
        const modal = document.getElementById('modal-confirmacion');
        const btnCancelar = document.getElementById('btn-cancelar');
        const btnConfirmar = document.getElementById('btn-confirmar');

        form.addEventListener('submit', function (e) {
            e.preventDefault();
            // Mostrar modal en lugar de confirm()
            modal.classList.add('active');
        });

        btnCancelar.addEventListener('click', function () {
            modal.classList.remove('active');
        });

        btnConfirmar.addEventListener('click', function () {
            modal.classList.remove('active');
            enviarFormulario();
        });

        function enviarFormulario() {
            spinner.style.display = 'block';
            submitButton.disabled = true;

            const formData = new FormData(form);
            const urlEncodedData = new URLSearchParams(formData).toString();

            // Reemplazar la URL ABAJO con la que te dé Google Apps Script (Debe terminar en /exec y tener /macros/s/...)
            const urlScript = "https://script.google.com/macros/s/AKfycbzJB8Dq1NbwPij5VLGQCz93q57hRh3G9hPyi24VSfMwCPc1ZTp68QXUtpmvRUrQO4FG/exec";

            fetch(urlScript, {
                method: "POST",
                body: urlEncodedData,
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                }
            })
                .then(response => response.text())
                .then(text => {
                    spinner.style.display = 'none';
                    submitButton.disabled = false;

                    if (text.includes("Error")) {
                        alert("Ocurrió un error en el servidor: " + text);
                    } else {
                        form.classList.add("hidden");
                        document.getElementById("mensaje-confirmacion").classList.remove("hidden");
                    }
                })
                .catch(error => {
                    spinner.style.display = 'none';
                    submitButton.disabled = false;
                    alert("No se pudo conectar con el servidor: " + error);
                });
        }
    </script>
</body>

</html>
