<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Registro de Bonos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: #f4f7f6;
            color: #333333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', Arial, sans-serif;
        }

        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 460px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .header-banner {
            margin: -30px -30px 22px;
            padding: 18px 24px;
            background: linear-gradient(135deg, #243782 0%, #407ce5 55%, #5896FF 100%);
            color: #ffffff;
            text-align: center;
            border-radius: 12px 12px 0 0;
        }

        .header-banner h2 {
            margin: 0;
            color: #ffffff;
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 0.04em;
            line-height: 1.3;
        }

        .description {
            text-align: center;
            margin-bottom: 25px;
            font-size: 15px;
            color: #666666;
            line-height: 1.4;
        }

        .form-section {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="radio"] {
            margin-right: 8px;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #cccccc;
            font-size: 14px;
            background-color: #ffffff;
            color: #333333;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #5896FF;
        }

        input[readonly] {
            background-color: #f0f0f0;
            color: #777777;
            cursor: not-allowed;
            border: 1px solid #e0e0e0;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #5896FF;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }

        button:hover {
            background-color: #407ce5;
        }

        .hidden {
            display: none;
        }

        .mensaje-confirmacion {
            text-align: center;
            font-size: 18px;
            padding: 20px;
            color: #28a745;
        }

        .spinner {
            margin: 10px auto 0;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #5896FF;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        button:disabled {
            background-color: #a0c4ff;
            cursor: wait;
        }

        /* Estilos del Modal Personalizado */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 400px;
            text-align: center;
            transform: translateY(-20px);
            transition: all 0.3s ease;
        }

        .modal-overlay.active .modal-box {
            transform: translateY(0);
        }

        .modal-box h3 {
            margin-top: 0;
            color: #333;
        }

        .modal-box p {
            color: #666;
            margin-bottom: 25px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .modal-btn {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            flex: 1;
        }

        .btn-confirm {
            background-color: #5896FF;
            color: white;
        }

        .btn-confirm:hover {
            background-color: #407ce5;
        }

        .btn-cancel {
            background-color: #f0f0f0;
            color: #333;
        }

        .btn-cancel:hover {
            background-color: #e0e0e0;
        }

        .info-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .info-banner {
            flex: 1;
            min-width: 0;
            text-align: center;
            padding: 12px 10px;
            background-color: #eef4ff;
            border: 1px solid #c5d9ff;
            border-radius: 8px;
            font-size: 14px;
            color: #243782;
            line-height: 1.4;
        }

        .info-banner strong {
            display: block;
            font-size: 16px;
            margin-top: 4px;
            word-break: break-word;
        }

        .mensaje-error-acceso {
            text-align: center;
            font-size: 17px;
            padding: 24px 16px;
            color: #c0392b;
            line-height: 1.5;
        }
    </style>
</head>

<body>

    <div class="form-container hidden" id="contenedor-error">
        <div class="header-banner">
            <h2>FORMULARIO DE BENEFICIOS</h2>
        </div>
        <p class="mensaje-error-acceso">No cuenta con incentivo ganado en este mes</p>
    </div>

    <div class="form-container" id="contenedor-formulario">
        <div class="header-banner">
            <h2>FORMULARIO DE BENEFICIOS</h2>
        </div>
        <div class="info-row" id="info-row">
            <div class="info-banner" id="mes-banner">
                Respuesta del mes:<br>
                <strong id="mes-display">—</strong>
            </div>
            <div class="info-banner" id="cve-banner">
                Clave de distribuidor:<br>
                <strong id="cve-display">—</strong>
            </div>
        </div>
        <p class="description">Indique de qué forma quiere percibir sus beneficios.</p>

        <form id="bono-form">
            <input type="hidden" id="mes" name="mes" />
            <input type="hidden" id="cve" name="cve" />
            <div class="form-section">
                <label for="date">Fecha:</label>
                <!-- Usamos 'date' (inglés) para coincidir con la columna en Sheets que pediste -->
                <input type="text" id="date" name="date" readonly />
            </div>

            <div class="form-section">
                <label for="user">Usuario:</label>
                <input type="text" id="user" name="user" readonly placeholder="Cargando URL..." />
            </div>

            <div class="form-section">
                <label for="bonus_type">Tipo de beneficio:</label>
                <select id="bonus_type" name="bonus_type" required>
                    <option value="" disabled selected>Seleccione una opción...</option>
                    <option value="Nota de Crédito">Nota de Crédito</option>
                    <option value="Partes Gratis">Partes Gratis</option>
                </select>
            </div>

            <button type="submit">Guardar mi respuesta</button>
            <div class="spinner" id="spinner"></div>
        </form>

        <div id="mensaje-confirmacion" class="mensaje-confirmacion hidden">
            ✅ Bono registrado con éxito.
        </div>
    </div>

    <!-- Modal de Confirmación -->
    <div class="modal-overlay" id="modal-confirmacion">
        <div class="modal-box">
            <h3 id="modal-title">Confirmar Envío</h3>
            <p id="modal-message">¿Estás seguro de tu respuesta?</p>
            <div class="modal-buttons">
                <button type="button" class="modal-btn btn-cancel" id="btn-cancelar">Cancelar</button>
                <button type="button" class="modal-btn btn-confirm" id="btn-confirmar">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        function getQueryParam(param) {
            const buscar = param.toLowerCase();
            const urlParams = new URLSearchParams(window.location.search);

            for (const [clave, valor] of urlParams.entries()) {
                if (clave.toLowerCase() === buscar) {
                    return valor;
                }
            }

            // Respaldo: parámetros en el hash (#mes=Apr%202025&...)
            if (window.location.hash && window.location.hash.indexOf("=") !== -1) {
                const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
                for (const [clave, valor] of hashParams.entries()) {
                    if (clave.toLowerCase() === buscar) {
                        return valor;
                    }
                }
            }

            return null;
        }

        const MESES_EN_US = [
            "Jan", "Feb", "Mar", "Apr", "May", "Jun",
            "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"
        ];

        const NOMBRES_MES = [
            "Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio",
            "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"
        ];

        const ALIAS_MES = {
            ene: 0, enero: 0, jan: 0, january: 0,
            feb: 1, febrero: 1, february: 1,
            mar: 2, marzo: 2, march: 2,
            abr: 3, abril: 3, apr: 3, april: 3,
            may: 4, mayo: 4,
            jun: 5, junio: 5, june: 5,
            jul: 6, julio: 6, july: 6,
            ago: 7, agosto: 7, aug: 7, august: 7,
            sep: 8, sept: 8, set: 8, septiembre: 8, september: 8,
            oct: 9, octubre: 9, october: 9,
            nov: 10, noviembre: 10, november: 10,
            dic: 11, dec: 11, diciembre: 11, december: 11
        };

        function formatearFechaHoraCDMX() {
            const partes = new Intl.DateTimeFormat("en-US", {
                timeZone: "America/Mexico_City",
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit",
                hour12: true
            }).formatToParts(new Date());

            function get(tipo) {
                for (let i = 0; i < partes.length; i++) {
                    if (partes[i].type === tipo) return partes[i].value;
                }
                return "";
            }

            return get("year") + "-" + get("month") + "-" + get("day") + " " +
                get("hour") + ":" + get("minute") + ":" + get("second") + " " + get("dayPeriod");
        }

        function indiceMesDesdeTexto(textoMes) {
            const clave = String(textoMes || "").toLowerCase();
            return Object.prototype.hasOwnProperty.call(ALIAS_MES, clave) ? ALIAS_MES[clave] : -1;
        }

        /** Normaliza el parámetro mes de la URL a "MMM YYYY" (en-US), ej. "Apr 2025". */
        function normalizarMesInyectado(mesRaw) {
            if (!mesRaw) return null;

            const mes = decodeURIComponent(String(mesRaw)).trim().replace(/\s+/g, " ");
            const matchTexto = mes.match(/^([A-Za-z]+)\s+(\d{4})$/);
            if (matchTexto) {
                const indice = indiceMesDesdeTexto(matchTexto[1]);
                if (indice !== -1) {
                    return MESES_EN_US[indice] + " " + matchTexto[2];
                }
            }

            const matchIso = mes.match(/^(\d{4})-(\d{2})$/);
            if (matchIso) {
                const indice = parseInt(matchIso[2], 10) - 1;
                if (indice >= 0 && indice < 12) {
                    return MESES_EN_US[indice] + " " + matchIso[1];
                }
            }

            const fecha = new Date(mes);
            if (!isNaN(fecha.getTime())) {
                const abrev = fecha.toLocaleString("en-US", { month: "short", timeZone: "UTC" });
                const anio = fecha.getUTCFullYear();
                const indice = MESES_EN_US.indexOf(abrev);
                if (indice !== -1) return MESES_EN_US[indice] + " " + anio;
            }

            return null;
        }

        /** Muestra el mes en español; el valor enviado al servidor sigue en MMM YYYY en-US. */
        function formatearMesParaMostrar(mesNormalizado) {
            if (!mesNormalizado) return "—";

            const match = mesNormalizado.match(/^([A-Za-z]{3})\s+(\d{4})$/);
            if (!match) return mesNormalizado;

            const indice = MESES_EN_US.findIndex(function (m) {
                return m.toLowerCase() === match[1].toLowerCase();
            });
            if (indice === -1) return mesNormalizado;

            return NOMBRES_MES[indice] + " " + match[2];
        }

        function obtenerMesDesdeUrl() {
            return normalizarMesInyectado(getQueryParam("mes"));
        }

        function sincronizarMesInyectado() {
            const mesNormalizado = obtenerMesDesdeUrl();
            const mesDisplay = document.getElementById("mes-display");
            const mesInput = document.getElementById("mes");

            if (mesInput) mesInput.value = mesNormalizado || "";
            if (mesDisplay) mesDisplay.textContent = formatearMesParaMostrar(mesNormalizado);

            return mesNormalizado;
        }

        function inicializarFormulario() {
            const bonusParam = getQueryParam("bonus");
            const tieneDerechoIncentivo = bonusParam !== "0";

            const contenedorFormulario = document.getElementById("contenedor-formulario");
            const contenedorError = document.getElementById("contenedor-error");
            const modal = document.getElementById("modal-confirmacion");

            if (!tieneDerechoIncentivo) {
                contenedorFormulario.classList.add("hidden");
                contenedorError.classList.remove("hidden");
                modal.classList.add("hidden");
                return;
            }

            contenedorError.classList.add("hidden");
            contenedorFormulario.classList.remove("hidden");

            // Siempre poblar campos que no dependen del mes
            const emailParam = getQueryParam("email") || getQueryParam("user");
            if (emailParam) {
                document.getElementById("user").value = decodeURIComponent(emailParam);
            } else {
                document.getElementById("user").value = "";
            }

            const cveParam = getQueryParam("cve");
            if (cveParam) {
                const cveDecodificada = decodeURIComponent(cveParam);
                document.getElementById("cve").value = cveDecodificada;
                document.getElementById("cve-display").textContent = cveDecodificada;
            }

            document.getElementById("date").value = formatearFechaHoraCDMX();

            const mesNormalizado = sincronizarMesInyectado();
            if (!mesNormalizado) {
                document.getElementById("mes-display").textContent = "—";
                document.getElementById("mes").value = "";
            }

            const form = document.getElementById("bono-form");
            const spinner = document.getElementById("spinner");
            const submitButton = form.querySelector("button");
            const btnCancelar = document.getElementById("btn-cancelar");
            const btnConfirmar = document.getElementById("btn-confirmar");

            function mostrarModal(titulo, mensaje, mostrarConfirmacion = false) {
                document.getElementById("modal-title").innerText = titulo;
                document.getElementById("modal-message").innerText = mensaje;
                btnConfirmar.style.display = mostrarConfirmacion ? "inline-block" : "none";
                btnCancelar.innerText = mostrarConfirmacion ? "Cancelar" : "Cerrar";
                modal.classList.add("active");
            }

            form.addEventListener("submit", function (e) {
                e.preventDefault();
                if (!sincronizarMesInyectado()) {
                    mostrarModal("Error", "Mes de incentivo no válido. Se espera formato MMM YYYY (ej. Apr 2025).", false);
                    return;
                }
                mostrarModal("Confirmar envío", "¿Estás seguro de tu respuesta?", true);
            });

            btnCancelar.addEventListener("click", function () {
                modal.classList.remove("active");
            });

            btnConfirmar.addEventListener("click", function () {
                modal.classList.remove("active");
                enviarFormulario();
            });

            function enviarFormulario() {
                if (!sincronizarMesInyectado()) {
                    mostrarModal("Error", "Mes de incentivo no válido. Se espera formato MMM YYYY (ej. Apr 2025).", false);
                    return;
                }

                spinner.style.display = "block";
                submitButton.disabled = true;

                sincronizarMesInyectado();

                const formData = new FormData(form);
                const urlEncodedData = new URLSearchParams(formData).toString();

                // URL de tu implementación Web App (termina en /exec)
                const urlScript = "https://script.google.com/macros/s/AKfycbwMjg9PhMRQUECCaQCZbFDX7ZBhF9B-KypS-_E_QwZaLaw6QmwCzh73tpKGeWTiGrNq/exec";

                // GET evita que el redirect 302 de Google pierda el body del POST (problema al probar HTML en local)
                const urlConDatos = urlScript + (urlScript.indexOf("?") === -1 ? "?" : "&") + urlEncodedData;

                fetch(urlConDatos, {
                    method: "GET",
                    redirect: "follow"
                })
                    .then(response => response.text())
                    .then(text => {
                        spinner.style.display = "none";
                        submitButton.disabled = false;

                        if (text.startsWith("ERROR")) {
                            const mensajeLimpio = text.replace(/^ERROR:\s*/i, "");
                            mostrarModal("Error", mensajeLimpio, false);
                        } else {
                            form.classList.add("hidden");
                            document.getElementById("info-row").classList.add("hidden");
                            document.querySelector(".description").classList.add("hidden");
                            document.getElementById("mensaje-confirmacion").classList.remove("hidden");
                        }
                    })
                    .catch(error => {
                        spinner.style.display = "none";
                        submitButton.disabled = false;
                        alert("No se pudo conectar con el servidor: " + error);
                    });
            }
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", inicializarFormulario);
        } else {
            inicializarFormulario();
        }
    </script>
</body>

</html>
