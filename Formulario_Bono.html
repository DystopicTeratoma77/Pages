<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Registro de Bonos</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: #333333;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        .form-container {
            background-color: #444;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #00b894;
        }

        .form-section {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="radio"] {
            margin-right: 8px;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: none;
            font-size: 14px;
            box-sizing: border-box;
        }

        input[readonly] {
            background-color: #555;
            color: #aaa;
            cursor: not-allowed;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #00b894;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }

        button:hover {
            background-color: #019374;
        }

        .hidden {
            display: none;
        }

        .mensaje-confirmacion {
            text-align: center;
            font-size: 18px;
            padding: 20px;
            color: #00b894;
        }

        .spinner {
            margin: 10px auto 0;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #00b894;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        button:disabled {
            background-color: #666;
            cursor: wait;
        }
    </style>
</head>

<body>

    <div class="form-container" id="contenedor-formulario">
        <h2>REGISTRO DE BONO</h2>

        <form id="bono-form">
            <div class="form-section">
                <label for="date">Fecha:</label>
                <!-- Usamos 'date' (inglés) para coincidir con la columna en Sheets que pediste -->
                <input type="text" id="date" name="date" readonly />
            </div>

            <div class="form-section">
                <label for="user">Usuario (Email):</label>
                <input type="text" id="user" name="user" readonly placeholder="Cargando URL..." />
            </div>

            <div class="form-section">
                <label for="cve">Clave (CVE):</label>
                <input type="text" id="cve" name="cve" readonly placeholder="Cargando URL..." />
            </div>

            <div class="form-section">
                <label for="bonus_type">Tipo de Bono:</label>
                <select id="bonus_type" name="bonus_type" required>
                    <option value="" disabled selected>Seleccione una opción...</option>
                    <option value="Nota de Crédito">Bono de Productividad</option>
                    <option value="Partes Gratis">Bono de Puntualidad</option>
                </select>
            </div>

            <button type="submit">Guardar Registro</button>
            <div class="spinner" id="spinner"></div>
        </form>

        <div id="mensaje-confirmacion" class="mensaje-confirmacion hidden">
            ✅ Bono registrado con éxito.
        </div>
    </div>

    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // 1. Inyectar 'user' (email) y 'cve' desde los parámetros de la URL
        // Ejemplo de URL esperada: Formulario_Bono.html?email=miguel@simdatagroup.com&cve=12345
        // o si usas 'user' en la URL en vez de 'email': Formulario_Bono.html?user=miguel@simdatagroup.com&cve=12345

        const emailParam = getQueryParam("email") || getQueryParam("user");
        if (emailParam) {
            document.getElementById("user").value = decodeURIComponent(emailParam);
        }

        const cveParam = getQueryParam("cve");
        if (cveParam) {
            document.getElementById("cve").value = decodeURIComponent(cveParam);
        }

        // 2. Insertar la fecha actual (date)
        const fechaCDMX = new Date().toLocaleString("sv-SE", { timeZone: "America/Mexico_City" }).replace(" ", "T");
        document.getElementById("date").value = fechaCDMX;

        // 3. Manejar el envío (submit) del formulario
        const form = document.getElementById('bono-form');
        const spinner = document.getElementById('spinner');
        const submitButton = form.querySelector('button');

        form.addEventListener('submit', function (e) {
            e.preventDefault();

            spinner.style.display = 'block';
            submitButton.disabled = true;

            const formData = new FormData(form);

            // Reemplazar la URL ABAJO con la que te dé Google Apps Script (Debe terminar en /exec y tener /macros/s/...)
            const urlScript = "https://script.google.com/u/0/home/projects/1dBME3uyUUMjdCcFI5zwHF2CG28WHFfd0lDmPJvvGfdzhaoo6fK2rYrAr/exec";

            fetch(urlScript, {
                method: "POST",
                body: formData
            })
                .then(response => {
                    spinner.style.display = 'none';
                    submitButton.disabled = false;

                    // Si quieres ser estricto con response.ok puedes validarlo
                    form.classList.add("hidden");
                    document.getElementById("mensaje-confirmacion").classList.remove("hidden");
                })
                .catch(error => {
                    spinner.style.display = 'none';
                    submitButton.disabled = false;
                    alert("No se pudo conectar con el servidor: " + error);
                });
        });
    </script>
</body>

</html>
